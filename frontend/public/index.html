<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#c9a227" />
  <title>Sany Adventures — Adventure Ticketing for East Africa</title>

  <!-- Inline SVG favicon — no file needed -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 48'><path d='M22 2L40 9L40 26Q40 38 22 46Q4 38 4 26L4 9Z' fill='%231a1506' stroke='%23c9a227' stroke-width='2'/><text x='22' y='32' text-anchor='middle' font-family='Georgia,serif' font-size='20' font-weight='900' fill='%23c9a227'>S</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

  <!-- Lucide icons (UMD build — use latest stable that has all icons we need) -->
  <script src="https://unpkg.com/lucide@0.378.0/dist/umd/lucide.min.js"></script>

  <style>
    /* ── CSS Variables ──────────────────────────────────────── */
    :root {
      /* ── Sany Adventures — Gold & Dark theme ─────────────── */
      --bg:       #0d0b08;
      --surface:  #141209;
      --surface2: #1c1810;
      --surface3: #252117;
      --border:   #2e2810;
      --border2:  #3a3318;

      --text:  #f0e8d0;
      --text2: #a89870;
      --text3: #6b5e3a;

      /* Gold — primary brand colour from logo */
      --accent:      #c9a227;
      --accent-dim:  rgba(201,162,39,0.14);

      /* Forest green — secondary colour from logo */
      --accent2:     #4a7c20;
      --accent2-dim: rgba(74,124,32,0.14);

      --danger:      #ef4444;
      --danger-dim:  rgba(239,68,68,0.12);
      --warning:     #d4850a;
      --warning-dim: rgba(212,133,10,0.14);
      --info:        #3b82f6;
      --info-dim:    rgba(59,130,246,0.12);

      --radius:    10px;
      --radius-lg: 16px;
      --sidebar-w: 240px;
    }

    :root[data-theme="gold"] {
      --accent:      #c9a227;
      --accent-dim:  rgba(201,162,39,0.14);
      --accent2:     #4a7c20;
      --accent2-dim: rgba(74,124,32,0.14);
    }

    :root[data-theme="ember"] {
      --accent:      #d97706;
      --accent-dim:  rgba(217,119,6,0.15);
      --accent2:     #b45309;
      --accent2-dim: rgba(180,83,9,0.14);
    }

    :root[data-theme="forest"] {
      --accent:      #4a7c20;
      --accent-dim:  rgba(74,124,32,0.16);
      --accent2:     #c9a227;
      --accent2-dim: rgba(201,162,39,0.12);
    }

    :root[data-theme="ocean"] {
      --accent:      #0f766e;
      --accent-dim:  rgba(15,118,110,0.16);
      --accent2:     #38bdf8;
      --accent2-dim: rgba(56,189,248,0.14);
    }

    :root[data-mode="light"] {
      --bg:       #f7f0de;
      --surface:  #fffaf0;
      --surface2: #f3e7c7;
      --surface3: #ead9ad;
      --border:   #d8c18f;
      --border2:  #c8ae72;

      --text:  #241b09;
      --text2: #6f5a28;
      --text3: #9f8443;

      --danger:      #dc2626;
      --danger-dim:  rgba(220,38,38,0.10);
      --warning:     #b45309;
      --warning-dim: rgba(180,83,9,0.12);
      --info:        #0369a1;
      --info-dim:    rgba(3,105,161,0.10);
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'kern' 1;
      color-scheme: dark;
    }

    :root[data-mode="light"] body {
      color-scheme: light;
    }

    h1, h2, h3, h4, h5 { font-family: 'Syne', sans-serif; }

    a { color: inherit; }

    /* ── Lucide icon base ───────────────────────────────────── */
    i[data-lucide] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    i[data-lucide] svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.15s;
      text-decoration: none; white-space: nowrap; line-height: 1;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary   { background: var(--accent); color: #0d0b08; }
    .btn-primary:hover:not(:disabled)   { background: #b8911e; }
    .btn-secondary { background: var(--surface3); color: var(--text); border: 1px solid var(--border2); }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }
    .btn-danger    { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }
    .btn-danger:hover:not(:disabled)    { background: rgba(239,68,68,0.22); }
    .btn-ghost     { background: transparent; color: var(--text2); }
    .btn-ghost:hover:not(:disabled)     { background: var(--surface2); color: var(--text); }
    .btn-orange    { background: var(--accent2); color: #000; }
    .btn-sm   { padding: 5px 10px; font-size: 12px; }
    .btn-lg   { padding: 12px 24px; font-size: 15px; }
    .btn-icon { padding: 7px; border-radius: 8px; }
    .w-full   { width: 100%; justify-content: center; }

    /* ── Forms ──────────────────────────────────────────────── */
    .input, .select, .textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 9px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus, .select:focus, .textarea:focus { border-color: var(--accent); }
    .input::placeholder, .textarea::placeholder   { color: var(--text3); }
    .input-error  { border-color: var(--danger) !important; }
    .textarea     { min-height: 80px; resize: vertical; }
    .form-group   { display: flex; flex-direction: column; }
    .form-label   { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
    .form-error   { font-size: 11px; color: var(--danger); margin-top: 4px; }
    .form-row     { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .divider      { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ── Cards ──────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    /* ── Support inbox ─────────────────────────────────────── */
    .support-shell {
      display: grid;
      grid-template-columns: minmax(290px, 360px) minmax(0, 1fr);
      min-height: calc(100vh - 110px);
      background:
        radial-gradient(circle at top left, rgba(201,162,39,0.08), transparent 28%),
        linear-gradient(180deg, var(--surface), var(--surface2));
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
    }
    .support-sidebar {
      background: var(--surface);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .support-sidebar-header {
      padding: 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .support-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }
    .support-subtitle {
      color: var(--text2);
      font-size: 12px;
      margin-top: 4px;
    }
    .support-search {
      margin: 14px 14px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 92%, transparent);
      border: 1px solid var(--border);
      color: var(--text2);
    }
    .support-search input {
      background: transparent;
      border: none;
      color: var(--text);
      width: 100%;
      outline: none;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
    }
    .support-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 14px 12px;
      border-bottom: 1px solid var(--border);
    }
    .support-list {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      min-height: 0;
      padding: 6px;
      gap: 4px;
    }
    .support-chat-row {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 18px;
      color: var(--text);
      text-align: left;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .support-chat-row:hover {
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 76%, transparent);
      border-color: var(--border);
      transform: translateY(-1px);
    }
    .support-chat-row.active {
      background: linear-gradient(180deg, rgba(201,162,39,0.16), rgba(201,162,39,0.09));
      border-color: rgba(201,162,39,0.28);
    }
    .support-chat-row.has-unread {
      box-shadow: inset 3px 0 0 rgba(74,124,32,0.9);
    }
    .support-chat-row.attention-urgent {
      background: linear-gradient(180deg, rgba(239,68,68,0.10), rgba(239,68,68,0.04));
      border-color: rgba(239,68,68,0.18);
    }
    .support-chat-row.attention-active {
      background: linear-gradient(180deg, rgba(212,133,10,0.10), rgba(212,133,10,0.04));
      border-color: rgba(212,133,10,0.18);
    }
    .support-chat-row.attention-urgent.active,
    .support-chat-row.attention-active.active {
      border-color: rgba(201,162,39,0.3);
    }
    .support-chat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(201,162,39,0.28), rgba(74,124,32,0.22));
      border: 1px solid rgba(201,162,39,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      color: var(--text);
      flex-shrink: 0;
    }
    .support-chat-avatar.large {
      width: 52px;
      height: 52px;
      border-radius: 16px;
    }
    .support-chat-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .support-chat-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .support-chat-name-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .support-chat-name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .support-chat-context {
      color: var(--text3);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .support-chat-time {
      color: var(--text3);
      font-size: 11px;
      flex-shrink: 0;
    }
    .support-chat-row.attention-urgent .support-chat-time {
      color: #fca5a5;
    }
    .support-chat-row.attention-active .support-chat-time {
      color: #fcd34d;
    }
    .support-chat-preview {
      color: var(--text2);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .support-chat-preview.unread {
      color: var(--text);
      font-weight: 600;
    }
    .support-preview-label {
      display: inline-flex;
      align-items: center;
      margin-right: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .support-preview-label.urgent {
      color: #fca5a5;
    }
    .support-preview-label.active {
      color: #fcd34d;
    }
    .support-preview-label.neutral {
      color: var(--text3);
    }
    .support-attention-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: rgba(201,162,39,0.5);
      box-shadow: 0 0 0 4px rgba(201,162,39,0.08);
    }
    .support-attention-dot.urgent {
      background: #ef4444;
      box-shadow: 0 0 0 4px rgba(239,68,68,0.12);
    }
    .support-attention-dot.active {
      background: #d4850a;
      box-shadow: 0 0 0 4px rgba(212,133,10,0.12);
    }
    .support-chat-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .support-count-pill {
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      background: rgba(74,124,32,0.22);
      border: 1px solid rgba(74,124,32,0.35);
      color: #9bd85d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }
    .support-thread {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: linear-gradient(180deg, var(--surface), var(--surface2));
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--surface) 94%, transparent), color-mix(in srgb, var(--surface2) 98%, transparent)),
        repeating-linear-gradient(
          135deg,
          rgba(201,162,39,0.02) 0,
          rgba(201,162,39,0.02) 12px,
          transparent 12px,
          transparent 24px
        );
    }
    .support-thread-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      background: var(--surface);
      background: color-mix(in srgb, var(--surface) 94%, transparent);
    }
    .support-thread-identity {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .support-mobile-back {
      display: none;
    }
    .support-mobile-details-active {
      border-color: rgba(201,162,39,0.28);
      background: rgba(201,162,39,0.12);
    }
    .support-thread-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }
    .support-thread-subtitle {
      color: var(--text2);
      font-size: 12px;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 520px;
    }
    .support-thread-badges {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .support-thread-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .support-thread-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      min-height: 0;
      flex: 1;
    }
    .support-thread-column {
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }
    .support-thread-sidepanel {
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 90%, transparent);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .support-bubble-row {
      display: flex;
      justify-content: flex-start;
    }
    .support-day-separator {
      display: flex;
      justify-content: center;
      margin: 8px 0 2px;
    }
    .support-day-separator span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 88%, transparent);
      border: 1px solid var(--border);
      color: var(--text3);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .support-bubble-row.mine {
      justify-content: flex-end;
    }
    .support-bubble {
      max-width: min(82%, 680px);
      padding: 12px 14px;
      border-radius: 18px 18px 18px 6px;
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 94%, transparent);
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }
    .support-bubble.mine {
      background: linear-gradient(180deg, rgba(201,162,39,0.18), rgba(201,162,39,0.10));
      border-color: rgba(201,162,39,0.25);
      border-radius: 18px 18px 6px 18px;
    }
    .support-bubble.internal {
      background: linear-gradient(180deg, rgba(59,130,246,0.14), rgba(59,130,246,0.08));
      border-color: rgba(59,130,246,0.28);
      box-shadow: inset 0 0 0 1px rgba(59,130,246,0.08);
    }
    .support-bubble-meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--text3);
      font-size: 11px;
      margin-bottom: 6px;
    }
    .support-bubble-flag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--info);
      margin-bottom: 6px;
      font-weight: 700;
    }
    .support-bubble-flag::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--info);
      display: inline-block;
    }
    .support-composer {
      padding: 16px 18px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      background: color-mix(in srgb, var(--surface) 95%, transparent);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .support-composer-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .support-thread-empty,
    .support-pane-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      color: var(--text2);
      text-align: center;
      padding: 24px;
    }
    .support-info-panel {
      border-top: 1px solid var(--border);
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 88%, transparent);
    }
    .support-info-card {
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    .support-info-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .support-kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .support-kpi {
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }
    .support-kpi-label {
      color: var(--text3);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .support-kpi-value {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }
    .support-timeline {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .support-timeline-item {
      padding: 12px 12px 12px 14px;
      border-radius: 14px;
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 92%, transparent);
      border: 1px solid var(--border);
      position: relative;
    }
    .support-timeline-item::before {
      content: '';
      position: absolute;
      left: -7px;
      top: 16px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,162,39,0.18);
    }
    .support-timeline-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .support-timeline-meta {
      color: var(--text3);
      font-size: 11px;
      margin-bottom: 6px;
    }
    .support-timeline-body {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.6;
      word-break: break-word;
    }

    /* ── Badges ─────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }
    .badge-green  { background: var(--accent-dim);  color: var(--accent);  }
    .badge-orange { background: var(--accent2-dim); color: var(--accent2); }
    .badge-red    { background: var(--danger-dim);  color: var(--danger);  }
    .badge-yellow { background: var(--warning-dim); color: var(--warning); }
    .badge-blue   { background: var(--info-dim);    color: var(--info);    }
    .badge-gray   { background: var(--surface3);    color: var(--text2);   }

    /* ── Avatar ─────────────────────────────────────────────── */
    .avatar {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .avatar-green  { background: var(--accent-dim);  color: var(--accent);  }
    .avatar-blue   { background: var(--info-dim);    color: var(--info);    }
    .avatar-orange { background: var(--accent2-dim); color: var(--accent2); }

    /* ── Layout ─────────────────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-w); background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; left: 0; top: 0; height: 100vh; z-index: 100;
    }
    .sidebar-logo {
      padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .logo-mark   { display: inline-flex; align-items: center; justify-content: center; }
    .logo-text   { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
    .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px;
      cursor: pointer; color: var(--text2);
      font-size: 13px; font-weight: 500;
      transition: all 0.12s; margin-bottom: 1px; text-decoration: none;
    }
    .nav-item:hover, .nav-item.active { background: var(--surface2); color: var(--text); }
    .nav-item.active { color: var(--accent); }

    .sidebar-footer { padding: 12px 10px; border-top: 1px solid var(--border); }
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
    }
    .sidebar-user:hover { background: var(--surface2); }

    .main-content  { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      height: 56px; border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center;
      justify-content: space-between; background: var(--bg);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; }
    .page-content { padding: 24px; flex: 1; }

    /* ── Shared responsive layout helpers ──────────────────── */
    .responsive-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .responsive-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .topbar-account {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      min-width: 0;
    }
    .topbar-account-meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .topbar-account-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 140px;
    }
    .topbar-account-role {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .notification-menu {
      position: relative;
      display: inline-flex;
    }
    .notification-trigger {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color .12s ease, transform .12s ease, background .12s ease;
    }
    .notification-trigger:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-1px);
    }
    .notification-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 2px var(--bg);
    }
    .notification-panel {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: min(360px, calc(100vw - 32px));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,.16);
      overflow: hidden;
      z-index: 90;
    }
    .notification-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .notification-panel-header strong {
      display: block;
      font-size: 13px;
    }
    .notification-panel-header small {
      display: block;
      margin-top: 3px;
      color: var(--text3);
      font-size: 11px;
    }
    .notification-list {
      max-height: 360px;
      overflow-y: auto;
    }
    .notification-item {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      text-align: left;
      cursor: pointer;
      color: inherit;
    }
    .notification-item:last-child {
      border-bottom: none;
    }
    .notification-item:hover {
      background: var(--surface2);
    }
    .notification-item.unread {
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 60%, transparent);
    }
    .notification-item-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 5px;
    }
    .notification-item-head strong {
      font-size: 12px;
      color: var(--text);
    }
    .notification-item-head span {
      flex-shrink: 0;
      color: var(--text3);
      font-size: 10px;
    }
    .notification-item p {
      margin: 0;
      color: var(--text2);
      font-size: 12px;
      line-height: 1.5;
    }
    .notification-empty {
      padding: 22px 16px;
      text-align: center;
      color: var(--text3);
      font-size: 12px;
    }
    .responsive-grid-2,
    .responsive-grid-3,
    .responsive-grid-4,
    .responsive-grid-6,
    .responsive-stats-strip,
    .responsive-filter-grid,
    .responsive-split {
      display: grid;
      gap: 16px;
    }
    .responsive-grid-2,
    .responsive-split {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .responsive-grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .responsive-grid-4,
    .responsive-stats-strip {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .responsive-grid-6,
    .responsive-filter-grid {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }
    .responsive-filter-grid > * {
      min-width: 0;
    }
    .responsive-filter-grid .filter-search-span-2 {
      grid-column: span 2;
    }
    .responsive-table-shell {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .responsive-table-shell table {
      min-width: 720px;
    }
    .admin-page-loading {
      padding: 40px;
      text-align: center;
      color: var(--text2);
    }
    .admin-loading-card {
      padding: 32px;
      min-height: 220px;
      display: grid;
      place-items: center;
    }
    .admin-loading-copy {
      text-align: center;
      color: var(--text2);
    }
    .admin-loading-spinner {
      margin: 0 auto 12px;
    }
    .admin-surface-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .admin-stat-strip {
      gap: 0;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .admin-stat-cell {
      padding: 16px 18px;
      border-right: 1px solid var(--border);
    }
    .admin-stat-cell:last-child {
      border-right: none;
    }
    .admin-stat-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .admin-stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
    }
    .admin-stat-value-lg {
      font-size: 24px;
    }
    .admin-stat-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
    }
    .admin-section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .admin-text-subtle {
      font-size: 12px;
      color: var(--text2);
    }
    .admin-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .admin-toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .admin-alert {
      margin-bottom: 16px;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
    }
    .admin-alert-danger {
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--danger);
    }
    .admin-empty-cell {
      text-align: center;
      color: var(--text3);
      padding: 32px;
    }
    .admin-mono-sm {
      font-family: monospace;
      font-size: 11px;
    }
    .admin-ellipsis {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .admin-table-cell-subtle {
      color: var(--text2);
      font-size: 12px;
    }
    .admin-table-cell-tight {
      font-size: 12px;
    }
    .admin-note-card {
      margin-top: 20px;
      padding: 16px 18px;
    }
    .admin-note-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text3);
      margin-bottom: 12px;
    }
    .admin-kpi-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .admin-kpi-card-soft {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)), var(--surface2);
    }
    .admin-detail-stack {
      display: grid;
      gap: 16px;
    }
    .admin-detail-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .admin-detail-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .admin-detail-value {
      margin-top: 6px;
    }
    .admin-detail-value-strong {
      font-weight: 600;
    }
    .admin-modal-summary {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .admin-modal-summary-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .admin-modal-summary-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--text2);
    }
    .admin-modal-warning,
    .admin-modal-error {
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
    }
    .admin-modal-warning {
      background: var(--warning-dim);
      border: 1px solid rgba(234,179,8,0.25);
      color: var(--warning);
    }
    .admin-modal-error {
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 14px;
      align-items: center;
    }
    .admin-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .admin-payload-block {
      margin: 0;
      padding: 14px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.6;
    }
    .admin-warning-banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 14px;
      margin-bottom: 14px;
      background: var(--warning-dim);
      border: 1px solid rgba(212,133,10,0.35);
      border-radius: 10px;
    }
    .admin-warning-copy {
      font-size: 12px;
      color: var(--warning);
      flex: 1;
    }
    .admin-filter-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .admin-filter-chip {
      text-transform: capitalize;
    }
    .admin-event-cell {
      min-width: 200px;
    }
    .admin-event-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .admin-event-thumb {
      width: 36px;
      height: 36px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .admin-event-title {
      font-weight: 500;
    }
    .admin-event-meta {
      font-size: 11px;
      color: var(--text2);
    }
    .admin-capacity-text {
      font-size: 13px;
    }
    .admin-capacity-bar {
      background: var(--surface3);
      border-radius: 2px;
      height: 3px;
      margin-top: 4px;
      width: 60px;
      overflow: hidden;
    }
    .admin-capacity-fill {
      background: var(--accent);
      height: 100%;
      border-radius: 2px;
    }
    .admin-icon-toggle-active {
      color: var(--warning);
    }
    .admin-icon-toggle-idle {
      color: var(--text3);
    }
    .admin-action-cluster {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .responsive-inline-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .responsive-pill-tabs {
      width: fit-content;
      max-width: 100%;
      overflow-x: auto;
    }
    .mobile-only-action {
      display: none !important;
    }
    .mobile-only-block {
      display: none !important;
    }
    .desktop-only-block {
      display: block !important;
    }
    .responsive-sticky-card {
      position: sticky;
      top: 76px;
    }
    .responsive-ticket-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .responsive-banner {
      height: 320px;
    }

    /* ── Stats ──────────────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
    .stat-card  { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
    .stat-icon  { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .stat-change{ font-size: 11px; margin-top: 8px; display: flex; align-items: center; gap: 3px; }

    /* ── Admin dashboard ───────────────────────────────────── */
    .admin-dashboard {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .admin-dashboard-state {
      padding: 40px;
      text-align: center;
      color: var(--text2);
    }
    .admin-dashboard-policy {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--info-dim);
      border: 1px solid rgba(59,130,246,0.25);
      color: var(--info);
      font-size: 12px;
    }
    .admin-dashboard-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.65fr) minmax(300px, 0.95fr);
      gap: 18px;
      align-items: stretch;
    }
    .admin-dashboard-hero-main,
    .admin-dashboard-hero-side,
    .admin-dashboard-panel {
      min-width: 0;
    }
    .admin-dashboard-hero-main {
      background:
        radial-gradient(circle at top left, rgba(201,162,39,0.14), transparent 44%),
        linear-gradient(180deg, var(--surface), var(--surface2));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.22);
    }
    .admin-dashboard-eyebrow {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
      font-weight: 700;
    }
    .admin-dashboard-hero-title {
      font-family: 'Syne', sans-serif;
      font-size: 34px;
      line-height: 1.05;
      margin-bottom: 12px;
      max-width: 11ch;
    }
    .admin-dashboard-hero-copy,
    .admin-dashboard-section-subtitle,
    .admin-dashboard-note {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.65;
    }
    .admin-dashboard-hero-copy {
      max-width: 58ch;
      margin-bottom: 18px;
    }
    .admin-dashboard-hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }
    .admin-dashboard-snapshot-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .admin-dashboard-snapshot,
    .admin-dashboard-pill-card,
    .admin-dashboard-commerce-item {
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 88%, transparent);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
    }
    .admin-dashboard-snapshot span,
    .admin-dashboard-pill-card span,
    .admin-dashboard-commerce-item span,
    .admin-dashboard-metric-row span,
    .admin-dashboard-priority-kicker,
    .admin-dashboard-performance-side span,
    .admin-dashboard-list-meta,
    .admin-dashboard-transaction-amount span {
      color: var(--text3);
      font-size: 11px;
    }
    .admin-dashboard-snapshot strong,
    .admin-dashboard-pill-card strong,
    .admin-dashboard-commerce-item strong,
    .admin-dashboard-priority-value,
    .admin-dashboard-performance-value {
      display: block;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      line-height: 1;
      margin-top: 8px;
      color: var(--text);
    }
    .admin-dashboard-snapshot strong { font-size: 24px; }
    .admin-dashboard-snapshot small,
    .admin-dashboard-commerce-item small,
    .admin-dashboard-performance-side small {
      display: block;
      color: var(--text2);
      font-size: 11px;
      margin-top: 6px;
    }
    .admin-dashboard-priority-card {
      height: 100%;
      background:
        linear-gradient(180deg, rgba(201,162,39,0.14), rgba(74,124,32,0.08)),
        linear-gradient(180deg, var(--surface), var(--surface2));
      border: 1px solid rgba(201,162,39,0.22);
      border-radius: 24px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .admin-dashboard-priority-value {
      font-size: 54px;
      color: var(--accent);
      margin-top: 0;
    }
    .admin-dashboard-priority-copy {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.6;
    }
    .admin-dashboard-priority-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
    }
    .admin-dashboard-priority-item {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 92%, transparent);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s, background 0.15s;
      text-align: left;
    }
    .admin-dashboard-priority-item:hover {
      border-color: rgba(201,162,39,0.3);
      transform: translateY(-1px);
      background: var(--surface3);
      background: color-mix(in srgb, var(--surface3) 90%, transparent);
    }
    .admin-dashboard-priority-item strong {
      display: block;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .admin-dashboard-priority-item span {
      font-size: 12px;
      color: var(--text2);
    }
    .admin-dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .admin-dashboard-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
    }
    .admin-dashboard-panel-feature {
      background:

    .admin-dashboard-list {

      min-height: 120px;

      align-items: center;
      justify-content: center;

      color: var(--text2);

      margin-top: 12px;

      align-items: center;
      gap: 14px;

      background: var(--warning);

      align-items: center;
      justify-content: center;
      min-height: 38px;

      border-color: rgba(201,162,39,0.28);

    /* ── Events grid ────────────────────────────────────────── */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;

    .event-card {
      background: var(--surface); border: 1px solid var(--border);

      cursor: pointer; transition: border-color 0.15s, transform 0.15s;

      height: 160px; background: var(--surface3);

      position: relative; overflow: hidden;

    .event-banner-placeholder { color: var(--text3); }

      position: absolute; top: 10px; left: 10px;
      background: rgba(20, 18, 9, 0.82);
      background: color-mix(in srgb, var(--surface) 82%, transparent); backdrop-filter: blur(4px);
      border: 1px solid var(--border2); border-radius: 6px;
      padding: 3px 8px; font-size: 11px; color: var(--text2);

    }
    .landing-brandmark {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .landing-nav-search {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
      min-width: 280px;
    }
    .landing-search-bar {
      min-width: min(520px, 100%);
      width: 100%;
    }
    .landing-nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .landing-stage {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.9fr);
      gap: 22px;
      padding: 40px 32px 28px;
      align-items: stretch;
    }
    .landing-stage-copy {
      padding: 38px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: linear-gradient(145deg, var(--surface), var(--surface2));
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--surface) 96%, transparent), color-mix(in srgb, var(--surface2) 98%, transparent)),
        var(--surface);
      box-shadow: 0 20px 48px rgba(0,0,0,0.24);
    }
    .landing-stage-eyebrow {
      margin-bottom: 18px;
    }
    .landing-stage-title {
      font-family: 'Syne', sans-serif;
      font-size: 64px;
      line-height: 0.96;
      letter-spacing: -0.03em;
      max-width: 10ch;
      margin-bottom: 18px;
    }
    .landing-stage-title span {
      color: var(--accent);
    }
    .landing-stage-subtitle {
      max-width: 58ch;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text2);
      margin-bottom: 24px;
    }
    .landing-stage-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .landing-stage-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .landing-stage-metric,
    .landing-stage-panel,
    .landing-event-card {
      min-width: 0;
    }
    .landing-stage-metric {
      padding: 15px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 82%, transparent);
    }
    .landing-stage-metric span,
    .landing-discovery-kicker,
    .landing-event-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      font-weight: 700;
    }
    .landing-stage-metric strong {
      display: block;
      margin-top: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      color: var(--text);
    }
    .landing-stage-panel {
      height: 100%;
      padding: 24px;
      border-radius: 28px;
      border: 1px solid rgba(201,162,39,0.22);
      background:
        linear-gradient(180deg, rgba(201,162,39,0.1), rgba(74,124,32,0.06)),
        var(--surface);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .landing-stage-panel-kicker {
      font-size: 12px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }
    .landing-stage-panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      line-height: 1.1;
    }
    .landing-stage-empty {
      color: var(--text2);
      line-height: 1.6;
      margin-top: auto;
    }
    .landing-stage-featured-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
    }
    .landing-stage-featured-item {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 82%, transparent);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }
    .landing-stage-featured-item:hover {
      transform: translateY(-1px);
      border-color: rgba(201,162,39,0.3);
      background: var(--surface3);
      background: color-mix(in srgb, var(--surface3) 88%, transparent);
    }
    .landing-stage-featured-item strong {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
    }
    .landing-stage-featured-item span {
      display: block;
      color: var(--text2);
      font-size: 12px;
      line-height: 1.5;
    }
    .landing-stage-featured-item em {
      font-style: normal;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      flex-shrink: 0;
    }
    .landing-discovery {
      padding: 8px 32px 32px;
    }
    .landing-discovery-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .landing-discovery-title {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      line-height: 1.08;
      max-width: 18ch;
    }
    .landing-discovery-copy {
      max-width: 42ch;
      color: var(--text2);
      line-height: 1.7;
      font-size: 14px;
    }
    .landing-filter-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }
    .landing-events-head {
      margin-bottom: 18px;
    }
    .landing-events-count {
      color: var(--text2);
      font-size: 14px;
      font-weight: 400;
    }
    .landing-events-grid {
      gap: 22px;
    }
    .landing-events-state {
      text-align: center;
      padding: 60px;
      color: var(--text2);
    }
    .landing-events-empty {
      border: 1px dashed var(--border2);
      border-radius: 20px;
      background: var(--surface2);
      background: color-mix(in srgb, var(--surface2) 74%, transparent);
    }
    .landing-event-card {
      background: linear-gradient(180deg, var(--surface), var(--surface2));
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 96%, transparent), color-mix(in srgb, var(--surface2) 98%, transparent));
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      box-shadow: 0 12px 28px rgba(0,0,0,0.16);
    }
    .landing-event-card:hover {
      transform: translateY(-3px);
      border-color: rgba(201,162,39,0.45);
      box-shadow: 0 18px 34px rgba(0,0,0,0.22);
    }
    .landing-event-card.is-sold-out {
      opacity: 0.78;
      cursor: default;
    }
    .landing-event-media {
      position: relative;
      height: 190px;
      background: var(--surface3);
      overflow: hidden;
    }
    .landing-event-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .landing-event-placeholder {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text3);
    }
    .landing-event-topline {
      position: absolute;
      inset: 12px 12px auto 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .landing-event-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(20, 18, 9, 0.82);
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 11px;
      backdrop-filter: blur(5px);
    }
    .landing-event-chip-danger {
      background: rgba(127,29,29,0.82);
      color: #fecaca;
      border-color: rgba(239,68,68,0.35);
    }
    .landing-event-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .landing-event-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .landing-event-meta {
      display: flex;
      flex-direction: column;
      gap: 7px;
      color: var(--text2);
      font-size: 12px;
    }
    .landing-event-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .landing-event-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .landing-event-price {
      margin-top: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      color: var(--accent);
      line-height: 1;
    }
    .landing-event-cta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .landing-event-availability {
      color: var(--text2);
      font-size: 11px;
    }
    .landing-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      padding: 26px 32px 34px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .landing-footer-brand {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .landing-footer-brand p {
      color: var(--text3);
      font-size: 12px;
    }
    .landing-footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .landing-footer-links a {
      color: var(--text2);
      font-size: 12px;
      text-decoration: none;
    }

    /* ── Organizer profile ─────────────────────────────────── */
    .organizer-profile-shell {
      min-height: 100vh;
      background: var(--bg);
    }
    .organizer-profile-state-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      padding: 24px;
    }
    .organizer-profile-state-shell-stack {
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
    .organizer-profile-state-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
    }
    .organizer-profile-state-copy {
      color: var(--text2);
      font-size: 14px;
      max-width: 420px;
    }
    .organizer-profile-hero {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 40px 24px 32px;
    }
    .organizer-profile-inner,
    .organizer-profile-section {
      max-width: 900px;
      margin: 0 auto;
    }
    .organizer-profile-header {
      align-items: flex-start;
      gap: 20px;
    }
    .organizer-profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      flex-shrink: 0;
      background: var(--accent-dim);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 900;
      font-size: 32px;
      color: var(--accent);
    }
    .organizer-profile-main {
      flex: 1;
      min-width: 200px;
    }
    .organizer-profile-title-row,
    .organizer-profile-meta-row,
    .organizer-profile-tags,
    .organizer-profile-footer-logo {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }
    .organizer-profile-title-row {
      gap: 10px;
      margin-bottom: 6px;
    }
    .organizer-profile-title {
      margin: 0;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 24px;
      line-height: 1.1;
    }
    .organizer-profile-verified {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(201,162,39,0.3);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .organizer-profile-description {
      color: var(--text2);
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 12px;
      max-width: 600px;
    }
    .organizer-profile-meta-row {
      gap: 16px;
      font-size: 13px;
      color: var(--text2);
    }
    .organizer-profile-inline-meta,
    .organizer-profile-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }
    .organizer-profile-link {
      color: var(--accent);
      text-decoration: none;
    }
    .organizer-profile-tags {
      gap: 6px;
      margin-top: 12px;
    }
    .organizer-profile-tag {
      font-size: 11px;
    }
    .organizer-profile-stats {
      gap: 12px;
      margin-top: 28px;
    }
    .organizer-profile-stat {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
    }
    .organizer-profile-stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface3);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .organizer-profile-stat-value {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      line-height: 1;
    }
    .organizer-profile-stat-label {
      margin-top: 3px;
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .organizer-profile-section-head {
      margin-bottom: 20px;
    }
    .organizer-profile-empty-state {
      padding: 48px 24px;
    }
    .organizer-profile-event-card {
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s, border-color 0.15s;
    }
    .organizer-profile-event-card.is-past {
      cursor: default;
      opacity: 0.75;
    }
    .organizer-profile-event-card:not(.is-past):hover {
      transform: translateY(-2px);
    }
    .organizer-profile-event-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    .organizer-profile-event-flag {
      position: absolute;
      top: 8px;
      right: 8px;
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 11px;
    }
    .organizer-profile-event-flag-danger {
      background: var(--danger);
      color: #fff;
      font-weight: 700;
    }
    .organizer-profile-event-flag-muted {
      background: rgba(0,0,0,0.6);
      color: #aaa;
    }
    .organizer-profile-event-meta {
      gap: 8px;
    }
    .organizer-profile-event-count {
      font-size: 12px;
      color: var(--text2);
    }
    .organizer-profile-event-price {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--accent);
    }
    .organizer-profile-footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      margin-top: 40px;
    }
    .organizer-profile-footer-logo {
      justify-content: center;
      margin-bottom: 10px;
    }
    .organizer-profile-footer-copy {
      margin: 0;
      font-size: 12px;
      color: var(--text3);
    }

    /* ── Checkout ───────────────────────────────────────────── */
    .checkout-layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    .ticket-type-row {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color 0.12s;
    }
    .ticket-type-row.selected { border-color: var(--accent); }
    .qty-control { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--text); cursor: pointer; font-size: 14px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .qty-btn:hover:not(:disabled) { background: var(--border); }
    .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .payment-method {
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; cursor: pointer; transition: border-color 0.12s;
      display: flex; align-items: center; gap: 12px;
    }
    .payment-method:hover, .payment-method.selected { border-color: var(--accent); }
    .mpesa-logo {
      background: #00a550; color: #fff;
      padding: 3px 7px; border-radius: 4px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    }

    /* ── Steps ──────────────────────────────────────────────── */
    .steps     { display: flex; align-items: flex-start; gap: 0; }
    .checkout-steps { width: 100%; }
    .step-item { display: flex; align-items: center; flex: 1; }
    .step-dot  {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; flex-shrink: 0;
      border: 2px solid var(--border2); color: var(--text3);
    }
    .step-dot.done   { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .step-dot.active { background: var(--accent); border-color: var(--accent); color: #000; }
    .step-label { font-size: 11px; color: var(--text3); margin-top: 4px; white-space: nowrap; }
    .step-line  { flex: 1; height: 2px; background: var(--border2); margin: 0 4px; margin-top: -14px; }
    .step-line.done { background: var(--accent); }

    /* ── Tickets ────────────────────────────────────────────── */
    .ticket-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      display: flex; flex-direction: column;
    }
    .ticket-header { padding: 16px; background: var(--surface2); }
    .ticket-body   { padding: 16px; flex: 1; }
    .ticket-dashed {
      border-top: 2px dashed var(--border2);
      margin: 0 16px;
    }
    .ticket-qr     { padding: 16px; display: flex; justify-content: center; }
    .ticket-footer {
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }
    .qr-container  { background: #fff; padding: 10px; border-radius: 8px; display: inline-flex; }

    /* ── Scan frame ─────────────────────────────────────────── */
    .scan-frame {
      border: 2px solid var(--accent); border-radius: var(--radius-lg);
      padding: 24px; display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }

    /* ── Modals ─────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 16px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-lg     { max-width: 720px; }
    .modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-body   { padding: 0 24px 24px; }

    /* ── Tables ─────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table       { width: 100%; border-collapse: collapse; }
    th {
      padding: 10px 14px; text-align: left;
      font-size: 11px; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── Empty state ────────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; text-align: center; gap: 12px;
    }
    .empty-icon  { color: var(--text3); }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 600; }
    .empty-sub   { font-size: 13px; color: var(--text2); max-width: 300px; }

    /* ── Pill tabs ──────────────────────────────────────────── */
    .pill-tabs {
      display: flex; background: var(--surface2); border-radius: var(--radius);
      padding: 3px; gap: 2px; border: 1px solid var(--border);
    }
    .pill-tab { padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text2); transition: all 0.12s; }
    .pill-tab.active { background: var(--surface3); color: var(--text); }

    /* ── Toast notifications ────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      min-width: 280px; max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: slideIn 0.2s ease;
      pointer-events: all;
    }
    .toast-success { border-left: 3px solid var(--accent); }
    .toast-error   { border-left: 3px solid var(--danger); }
    .toast-info    { border-left: 3px solid var(--info); }

    /* ── Animations ─────────────────────────────────────────── */

  <div id="root"></div>

  <!--
    Lucide icon rendering:
    React renders <i data-lucide="icon-name"> tags.
    We DO NOT call lucide.createIcons() here because it replaces nodes and can
    conflict with React reconciliation. Instead we inject SVG inside existing
    <i> elements, which keeps the DOM tree stable for React.
  -->
  <script>
    (function () {
      function renderIconElement(el) {
        if (!el || !el.dataset) return;
        var name = el.dataset.lucide;
        if (!name) return;
        if (!window.lucide || !window.lucide.icons) return;
        var icon = window.lucide.icons[name];
        if (!icon || typeof icon.toSvg !== 'function') return;

        // Keep the original <i> node so React's DOM ownership remains intact.
        el.innerHTML = icon.toSvg({
          width: '100%',
          height: '100%',
          stroke: 'currentColor',
          'stroke-width': 2,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round',
          fill: 'none'
        });
      }

      function renderIcons(root) {
        var scope = root || document;
        if (scope.nodeType === 1 && scope.matches && scope.matches('i[data-lucide]')) {
          renderIconElement(scope);
          return;
        }
        if (!scope.querySelectorAll) return;
        scope.querySelectorAll('i[data-lucide]').forEach(renderIconElement);
      }

      // Run once after initial load.
      document.addEventListener('DOMContentLoaded', function () { renderIcons(document); });

      // Re-run for newly inserted nodes only.
      var observer = new MutationObserver(function (mutations) {
        mutations.forEach(function (m) {
          Array.from(m.addedNodes).forEach(function (node) {
            if (node.nodeType !== 1) return;
            renderIcons(node);
          });
        });
      });

      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
