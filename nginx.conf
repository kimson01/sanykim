# ─────────────────────────────────────────────────────────────
# Sany Adventures — Nginx configuration
# Place at: /etc/nginx/sites-available/sanyadventures
# Enable:   sudo ln -s /etc/nginx/sites-available/sanyadventures /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────

# ── Without a domain: serve over HTTP on port 80 ─────────────
# Use this block while you don't have a domain yet.
server {
    listen 80 default_server;
    server_name _;          # matches any hostname or IP

    # React frontend (SPA — all unknown paths fall back to index.html)
    root /var/www/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → Node.js on port 5000
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 15M;
    }

    # Uploaded banner images
    location /uploads/ {
        alias /home/ubuntu/sanyadventures/backend/uploads/;
        expires 7d;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:5000;
        access_log off;
    }

    # Cache built React assets
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}


